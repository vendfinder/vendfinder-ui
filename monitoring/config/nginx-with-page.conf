upstream vendfinder_frontend {
    server host.docker.internal:3000;
}

server {
    listen 80;
    server_name _;

    # Serve the monitoring page at /admin/monitoring
    location /admin/monitoring {
        root /usr/share/nginx/html;
        try_files /monitoring-page.html =404;
        add_header Content-Type text/html;
    }

    location /admin/monitoring/ {
        root /usr/share/nginx/html;
        try_files /monitoring-page.html =404;
        add_header Content-Type text/html;
    }

    # Monitoring status endpoint
    location /admin/monitoring/status {
        add_header Content-Type application/json;
        return 200 '{"service":"vendfinder-monitoring","status":"available","grafana":"http://localhost:3001","access":"/admin/monitoring","login":"admin/vendfinder123"}';
    }

    # VendFinder main app (everything else)
    location / {
        proxy_pass http://vendfinder_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}