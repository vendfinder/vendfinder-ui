upstream vendfinder_frontend {
    server host.docker.internal:3000;
}

upstream grafana {
    server vendfinder-grafana:3000;
}

upstream prometheus {
    server vendfinder-prometheus:9090;
}

server {
    listen 80;
    server_name _;

    # Grafana monitoring dashboard with proper path handling
    location /admin/monitoring/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical: Handle Grafana's internal paths
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Script-Name /admin/monitoring;

        # Handle WebSocket connections for Grafana live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Handle redirects properly
        proxy_redirect http://grafana/ /admin/monitoring/;
        proxy_redirect / /admin/monitoring/;
    }

    # Grafana login and auth endpoints
    location /admin/monitoring/login {
        proxy_pass http://grafana/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /admin/monitoring;

        proxy_redirect http://grafana/ /admin/monitoring/;
        proxy_redirect / /admin/monitoring/;
    }

    # Grafana API endpoints
    location /admin/monitoring/api/ {
        proxy_pass http://grafana/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /admin/monitoring;
    }

    # Grafana static assets
    location /admin/monitoring/public/ {
        proxy_pass http://grafana/public/;
        proxy_set_header Host $host;
    }

    # Grafana avatar and other assets
    location /admin/monitoring/avatar/ {
        proxy_pass http://grafana/avatar/;
        proxy_set_header Host $host;
    }

    # Prometheus (safe route)
    location /admin/prometheus/ {
        proxy_pass http://prometheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Monitoring status endpoint
    location /admin/monitoring/status {
        add_header Content-Type application/json;
        return 200 '{"service":"vendfinder-monitoring","status":"available","grafana":"/admin/monitoring/","prometheus":"/admin/prometheus/","login":"admin/vendfinder123"}';
    }

    # VendFinder main app (catch-all for everything else)
    location / {
        proxy_pass http://vendfinder_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}