upstream vendfinder_frontend {
    # Point to the actual VendFinder frontend running on host
    server host.docker.internal:3000;
}

upstream grafana {
    server vendfinder-grafana:3000;
}

upstream prometheus {
    server vendfinder-prometheus:9090;
}

server {
    listen 80;
    server_name _;

    # VendFinder main app (proxy to existing frontend)
    location / {
        proxy_pass http://vendfinder_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Monitoring dashboard (safe route that doesn't conflict)
    location /admin/monitoring/ {
        proxy_pass http://grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Handle WebSocket connections for Grafana live updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prometheus (safe route)
    location /admin/prometheus/ {
        proxy_pass http://prometheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check for monitoring
    location /admin/monitoring/health {
        proxy_pass http://grafana/api/health;
        proxy_set_header Host $host;
    }

    # Monitoring status endpoint
    location /admin/monitoring/status {
        add_header Content-Type application/json;
        return 200 '{"service":"vendfinder-monitoring","status":"available","grafana":"/admin/monitoring/","prometheus":"/admin/prometheus/","health":"/admin/monitoring/health","description":"Access monitoring through VendFinder admin panel"}';
    }
}