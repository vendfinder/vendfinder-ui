upstream vendfinder_frontend {
    server host.docker.internal:3000;
}

server {
    listen 80;
    server_name _;

    # Direct Grafana redirect (simple and reliable)
    location /admin/monitoring {
        return 301 http://$host:3001;
    }

    location /admin/monitoring/ {
        return 301 http://$host:3001;
    }

    # Grafana direct link for easy access
    location /monitoring {
        return 301 http://$host:3001;
    }

    # Monitoring status endpoint with correct info
    location /admin/monitoring/status {
        add_header Content-Type application/json;
        return 200 '{"service":"vendfinder-monitoring","status":"available","message":"Monitoring available at port 3001","grafana":"http://localhost:3001","username":"admin","password":"vendfinder123","note":"Direct access is more reliable than proxy"}';
    }

    # VendFinder main app (everything else)
    location / {
        proxy_pass http://vendfinder_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}