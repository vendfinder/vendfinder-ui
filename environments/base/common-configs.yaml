apiVersion: v1
kind: ConfigMap
metadata:
  name: vendfinder-config
  namespace: vendfinder
data:
  # Common configuration for all environments
  APP_NAME: "VendFinder"
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  CORS_ORIGIN: "*"
  # Service URLs (internal cluster communication)
  USER_SERVICE_URL: "http://user-service:3004"
  CHAT_SERVICE_URL: "http://chat-service:3005"
  WEBSOCKET_SERVICE_URL: "http://websocket-service:3006"
  PRODUCT_SERVICE_URL: "http://product-service:3000"
  ORDER_SERVICE_URL: "http://order-service:3000"
  VENDOR_SERVICE_URL: "http://vendor-service:3003"
  SUPPORT_BOT_URL: "http://support-bot:3009"
  # Redis and database connection patterns
  REDIS_URL: "redis://redis:6379"
  # Database URLs for microservices (correct credentials and database names)
  USER_DB_URL: "postgresql://vendfinder:stagingpassword123@user-db:5432/user_db"
  ORDER_DB_URL: "postgresql://vendfinder:stagingpassword123@order-db:5432/order_db"
  PRODUCT_DB_URL: "postgresql://vendfinder:stagingpassword123@product-db:5432/product_db"
  CHAT_DB_URL: "postgresql://vendfinder:stagingpassword123@chat-db:5432/chat_db"
  # Monitoring
  METRICS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30s"