apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: vendfinder-staging
  labels:
    app: frontend
    environment: staging
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/websocket-services: websocket-service
spec:
  ingressClassName: nginx
  rules:
  - host: staging.vendfinder.com
    http:
      paths:
      - backend:
          service:
            name: websocket-service
            port:
              number: 3006
        path: /socket.io
        pathType: Prefix
      - backend:
          service:
            name: websocket-service
            port:
              number: 3006
        path: /api/ws
        pathType: Prefix
      - backend:
          service:
            name: frontend
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - staging.vendfinder.com
    secretName: staging-vendfinder-tls