apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: vendfinder-staging
  labels:
    app: chat-service
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - gateway
      imagePullSecrets:
        - name: vendfinder-registry
      containers:
        - name: chat-service
          image: registry.digitalocean.com/vendfinder-registry/chat-service:latest
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: chat-config
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
            - name: USER_SERVICE_URL
              value: http://user-service:3004
            - name: BOT_USER_ID
              value: "00000000-0000-0000-0000-000000000001"
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: support-bot-secrets
                  key: internal-service-key
            - name: CORS_ORIGIN
              value: "*"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: vendfinder-staging
  labels:
    app: chat-service
    environment: staging
spec:
  selector:
    app: chat-service
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
