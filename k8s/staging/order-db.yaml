apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: vendfinder-staging
  labels:
    app: order-db
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - gateway
      containers:
        - name: order-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: order_db
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: order-db-credentials
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: order-db-data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
      volumes:
        - name: order-db-data
          persistentVolumeClaim:
            claimName: order-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: vendfinder-staging
  labels:
    app: order-db
    environment: staging
spec:
  selector:
    app: order-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
