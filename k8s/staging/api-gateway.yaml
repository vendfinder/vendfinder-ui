apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vendfinder-staging
  labels:
    app: api-gateway
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: vendfinder-registry
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - gateway
      containers:
        - name: api-gateway
          image: registry.digitalocean.com/vendfinder-registry/api-gateway:v20260309-product-uploads-v3
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: USER_SERVICE_URL
              value: "http://user-service:3004"
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:3006"
            - name: WEBSOCKET_SERVICE_URL
              value: "http://websocket-service:3000"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3002"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3007"
            - name: CORS_ORIGIN
              value: "*"
            - name: SPACES_KEY
              valueFrom:
                secretKeyRef:
                  name: spaces-credentials
                  key: SPACES_KEY
            - name: SPACES_SECRET
              valueFrom:
                secretKeyRef:
                  name: spaces-credentials
                  key: SPACES_SECRET
            - name: SPACES_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: vendfinder-config
                  key: SPACES_ENDPOINT
            - name: SPACES_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: vendfinder-config
                  key: SPACES_BUCKET
            - name: SPACES_CDN_URL
              valueFrom:
                configMapKeyRef:
                  name: vendfinder-config
                  key: SPACES_CDN_URL
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: vendfinder-staging
  labels:
    app: api-gateway
    environment: staging
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
