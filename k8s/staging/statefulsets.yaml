apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chat-db
  namespace: vendfinder-staging
  labels:
    app: chat-db
    environment: staging
spec:
  serviceName: chat-db
  replicas: 1
  selector:
    matchLabels:
      app: chat-db
  template:
    metadata:
      labels:
        app: chat-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: chat_db
            - name: POSTGRES_USER
              value: vendfinder
            - name: POSTGRES_PASSWORD
              value: stagingpassword123
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 1Gi
---
