apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: vendfinder
  labels:
    app: order-service
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      imagePullSecrets:
        - name: vendfinder-registry
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - prod-app
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: order-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: order-service
          image: registry.digitalocean.com/vendfinder-registry/order-service:latest
          ports:
            - containerPort: 3007
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: url
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: vendfinder
  labels:
    app: order-service
    environment: production
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 3000
      targetPort: 3007
