apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: vendfinder
  labels:
    app: review-service
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      imagePullSecrets:
        - name: vendfinder-registry
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - prod-app
      containers:
        - name: review-service
          image: registry.digitalocean.com/vendfinder-registry/review-service:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: vendfinder
  labels:
    app: review-service
    environment: production
spec:
  type: ClusterIP
  selector:
    app: review-service
  ports:
    - port: 3000
      targetPort: 3000
