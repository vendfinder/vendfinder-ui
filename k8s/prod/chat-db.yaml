apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-db
  namespace: vendfinder
  labels:
    app: chat-db
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-db
  template:
    metadata:
      labels:
        app: chat-db
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - prod-data
      containers:
        - name: chat-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-db-credentials
                  key: password
            - name: POSTGRES_DB
              value: chat_db
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
              subPath: postgres
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chat-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: chat-db
  namespace: vendfinder
  labels:
    app: chat-db
    environment: production
spec:
  type: ClusterIP
  selector:
    app: chat-db
  ports:
    - port: 5432
      targetPort: 5432
