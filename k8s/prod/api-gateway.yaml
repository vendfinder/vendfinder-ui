apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vendfinder
  labels:
    app: api-gateway
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: vendfinder-registry
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - prod-app
      containers:
        - name: api-gateway
          image: registry.digitalocean.com/vendfinder-registry/api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: USER_SERVICE_URL
              value: "http://user-service:3004"
            - name: CHAT_SERVICE_URL
              value: "http://chat-service:3006"
            - name: WEBSOCKET_SERVICE_URL
              value: "http://websocket-service:3006"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3000"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3000"
            - name: REVIEW_SERVICE_URL
              value: "http://review-service:3003"
            - name: CORS_ORIGIN
              value: "*"
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: vendfinder
  labels:
    app: api-gateway
    environment: production
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
