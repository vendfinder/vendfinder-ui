---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vendfinder-monitoring
  namespace: vendfinder
  labels:
    app: vendfinder-monitoring
    component: monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  rules:
  - host: vendfinder.local  # Replace with your actual domain
    http:
      paths:
      # Grafana monitoring dashboard
      - path: /admin/monitoring(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      # Prometheus
      - path: /admin/prometheus(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      # Metrics endpoint
      - path: /admin/metrics(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: inventory-metrics
            port:
              number: 9091

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-network-policy
  namespace: vendfinder
spec:
  podSelector:
    matchLabels:
      component: monitoring
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: vendfinder
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 9091
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: vendfinder
    - podSelector: {}
  - to: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: UDP
      port: 53    # DNS