              {
                "expr": "sum by (vendor_name, vendor_id, category)(vendfinder_vendor_products_total)",
                "format": "table",
                "instant": true,
                "intervalFactor": 1,
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "custom": {
                  "align": "auto",
                  "displayMode": "auto"
                },
                "mappings": [],
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 5 },
                    { "color": "red", "value": 10 }
                  ]
                }
              },
              "overrides": [
                {
                  "matcher": { "id": "byName", "options": "Value" },
                  "properties": [
                    { "id": "displayName", "value": "Product Count" },
                    { "id": "custom.displayMode", "value": "color-background" }
                  ]
                },
                {
                  "matcher": { "id": "byName", "options": "vendor_name" },
                  "properties": [
                    { "id": "displayName", "value": "Vendor" }
                  ]
                },
                {
                  "matcher": { "id": "byName", "options": "category" },
                  "properties": [
                    { "id": "displayName", "value": "Category" }
                  ]
                }
              ]
            },
            "options": {
              "showHeader": true
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 12, "w": 12, "x": 0, "y": 12 }
          },
          {
            "id": 3,
            "title": "Vendor Activity - Orders by Status",
            "type": "heatmap",
            "targets": [
              {
                "expr": "vendfinder_orders_by_status",
                "format": "time_series",
                "intervalFactor": 1,
                "refId": "A",
                "legendFormat": "{{ vendor_name }} - {{ status }}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "spectrum" },
                "custom": {}
              },
              "overrides": []
            },
            "options": {
              "calculate": false,
              "calculation": {},
              "cellGap": 2,
              "cellValues": {},
              "color": { "exponent": 0.5, "fill": "dark-orange", "mode": "spectrum", "reverse": false, "scale": "exponential", "scheme": "Oranges", "steps": 64 },
              "exemplars": { "color": "rgba(255,0,255,0.7)" },
              "filterValues": { "le": 1e-9 },
              "legend": { "show": false },
              "rowsFrame": { "layout": "auto" },
              "tooltip": { "show": true, "yHistogram": false },
              "yAxis": { "axisPlacement": "left", "reverse": false, "unit": "short" }
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 12, "w": 12, "x": 12, "y": 12 }
          }
        ],
        "time": { "from": "now-1h", "to": "now" },
        "timepicker": {},
        "templating": {
          "list": [
            {
              "current": { "selected": false, "text": "All", "value": "$__all" },
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "definition": "label_values(vendfinder_vendor_revenue_dollars, vendor_name)",
              "hide": 0,
              "includeAll": true,
              "label": "Vendor",
              "multi": true,
              "name": "vendor",
              "options": [],
              "query": {
                "query": "label_values(vendfinder_vendor_revenue_dollars, vendor_name)",
                "refId": "StandardVariableQuery"
              },
              "refresh": 1,
              "regex": "",
              "skipUrlSync": false,
              "sort": 0,
              "type": "query"
            }
          ]
        },
        "annotations": { "list": [] },
        "refresh": "5s",
        "schemaVersion": 30,
        "version": 0,
        "links": []
    }

