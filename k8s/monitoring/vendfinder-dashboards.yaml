---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vendfinder-dashboards
  namespace: vendfinder
  labels:
    app: grafana
data:
  vendor-analytics.json: |
    {
        "id": null,
        "title": "VendFinder - Vendor Analytics",
        "tags": ["vendfinder", "vendors"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Total Vendor Revenue",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(vendfinder_vendor_revenue_dollars)",
                "format": "time_series",
                "intervalFactor": 1,
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "custom": {},
                "mappings": [],
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 80 }
                  ]
                },
                "unit": "currencyUSD"
              },
              "overrides": []
            },
            "options": {
              "colorMode": "value",
              "graphMode": "area",
              "justifyMode": "auto",
              "orientation": "auto",
              "reduceOptions": {
                "values": false,
                "calcs": ["lastNotNull"],
                "fields": ""
              },
              "textMode": "auto"
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }
          },
          {
            "id": 2,
            "title": "Active Vendors",
            "type": "stat",
            "targets": [
              {
                "expr": "count(count by (vendor_name)(vendfinder_vendor_revenue_dollars))",
                "format": "time_series",
                "intervalFactor": 1,
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "custom": {},
                "mappings": [],
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null }
                  ]
                },
                "unit": "short"
              },
              "overrides": []
            },
            "options": {
              "colorMode": "value",
              "graphMode": "area",
              "justifyMode": "auto",
              "orientation": "auto",
              "reduceOptions": {
                "values": false,
                "calcs": ["lastNotNull"],
                "fields": ""
              },
              "textMode": "auto"
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }
          },
          {
            "id": 3,
            "title": "Vendor Revenue Breakdown",
            "type": "barchart",
            "targets": [
              {
                "expr": "vendfinder_vendor_revenue_dollars",
                "format": "time_series",
                "intervalFactor": 1,
                "refId": "A",
                "legendFormat": "{{ vendor_name }}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": {
                  "axisLabel": "",
                  "axisPlacement": "auto",
                  "barAlignment": 0,
                  "drawStyle": "line",
                  "fillOpacity": 10,
                  "gradientMode": "none",
                  "hideFrom": { "legend": false, "tooltip": false, "vis": false },
                  "lineInterpolation": "linear",
                  "lineWidth": 1,
                  "pointSize": 5,
                  "scaleDistribution": { "type": "linear" },
                  "showPoints": "never",
                  "spanNulls": false,
                  "stacking": { "group": "A", "mode": "none" },
                  "thresholdsStyle": { "mode": "off" }
                },
                "mappings": [],
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 80 }
                  ]
                },
                "unit": "currencyUSD"
              },
              "overrides": []
            },
            "options": {
              "legend": { "calcs": [], "displayMode": "visible", "placement": "bottom" },
              "tooltip": { "mode": "single" }
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 12, "w": 24, "x": 0, "y": 8 }
          },
          {
            "id": 4,
            "title": "Orders by Status and Vendor",
            "type": "table",
            "targets": [
              {
                "expr": "vendfinder_orders_by_status",
                "format": "table",
                "instant": true,
                "intervalFactor": 1,
                "refId": "A"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "thresholds" },
                "custom": {
                  "align": "auto",
                  "displayMode": "auto"
                },
                "mappings": [],
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 80 }
                  ]
                }
              },
              "overrides": []
            },
            "options": {
              "showHeader": true
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 12, "w": 12, "x": 0, "y": 20 }
          },
          {
            "id": 5,
            "title": "Payment Status Distribution",
            "type": "piechart",
            "targets": [
              {
                "expr": "sum by (payment_status)(vendfinder_payments_by_status)",
                "format": "time_series",
                "intervalFactor": 1,
                "refId": "A",
                "legendFormat": "{{ payment_status }}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": { "mode": "palette-classic" },
                "custom": {
                  "hideFrom": { "legend": false, "tooltip": false, "vis": false }
                },
                "mappings": []
              },
              "overrides": []
            },
            "options": {
              "reduceOptions": {
                "values": false,
                "calcs": ["lastNotNull"],
                "fields": ""
              },
              "pieType": "pie",
              "tooltip": { "mode": "single" },
              "legend": { "displayMode": "visible", "placement": "right" }
            },
            "pluginVersion": "10.1.0",
            "gridPos": { "h": 12, "w": 12, "x": 12, "y": 20 }
          }
        ],
        "time": { "from": "now-1h", "to": "now" },
        "timepicker": {},
        "templating": { "list": [] },
        "annotations": { "list": [] },
        "refresh": "5s",
        "schemaVersion": 30,
        "version": 0,
        "links": []
    }

  vendor-details.json: |
    {
