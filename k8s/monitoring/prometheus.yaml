---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: vendfinder
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # VendFinder Services
      - job_name: 'vendfinder-order-service'
        static_configs:
          - targets: ['order-service.vendfinder.svc.cluster.local:3000']
        metrics_path: '/metrics'
        scrape_interval: 10s

      - job_name: 'vendfinder-product-service'
        static_configs:
          - targets: ['product-service.vendfinder.svc.cluster.local:3000']
        metrics_path: '/metrics'
        scrape_interval: 10s

      - job_name: 'vendfinder-user-service'
        static_configs:
          - targets: ['user-service.vendfinder.svc.cluster.local:3004']
        metrics_path: '/metrics'
        scrape_interval: 10s

      - job_name: 'vendfinder-api-gateway'
        static_configs:
          - targets: ['api-gateway.vendfinder.svc.cluster.local:3000']
        metrics_path: '/metrics'
        scrape_interval: 10s

      - job_name: 'vendfinder-inventory-metrics'
        static_configs:
          - targets: ['inventory-metrics.vendfinder.svc.cluster.local:9091']
        metrics_path: '/metrics'
        scrape_interval: 10s

      # Self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: vendfinder
  labels:
    app: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: vendfinder
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.47.0
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--web.console.libraries=/usr/share/prometheus/console_libraries'
          - '--web.console.templates=/usr/share/prometheus/consoles'
          - '--web.enable-lifecycle'
          - '--storage.tsdb.retention.time=15d'
          - '--web.external-url=/prometheus'
          - '--web.route-prefix=/'
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus
        - name: storage-volume
          mountPath: /prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 60
          periodSeconds: 15
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
      - name: storage-volume
        persistentVolumeClaim:
          claimName: prometheus-storage

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: vendfinder
  labels:
    app: prometheus
    component: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP