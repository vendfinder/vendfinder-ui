version: '3.8'

networks:
  vendfinder-net:
    driver: bridge

services:
  chat-db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: vendfinder
      POSTGRES_PASSWORD: vendfinder_pass
    volumes:
      - chat-db-data:/var/lib/postgresql/data
    networks:
      - vendfinder-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vendfinder -d chat_db']
      interval: 5s
      timeout: 3s
      retries: 5

  user-db:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: vendfinder
      POSTGRES_PASSWORD: vendfinder_pass
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - vendfinder-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vendfinder -d user_db']
      interval: 5s
      timeout: 3s
      retries: 5

  product-db:
    image: postgres:16-alpine
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: vendfinder
      POSTGRES_PASSWORD: vendfinder_pass
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - vendfinder-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vendfinder -d product_db']
      interval: 5s
      timeout: 3s
      retries: 5

  order-db:
    image: postgres:16-alpine
    ports:
      - '5435:5432'
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: vendfinder
      POSTGRES_PASSWORD: vendfinder_pass
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - vendfinder-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vendfinder -d order_db']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - vendfinder-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  user-service:
    build: ./user-service-oauth
    ports:
      - '3004:3004'
    environment:
      PORT: '3004'
      DATABASE_URL: postgresql://vendfinder:vendfinder_pass@user-db:5432/user_db
      JWT_SECRET: vendfinder-jwt-secret-change-in-production
      CORS_ORIGIN: '*'
      # DigitalOcean Spaces Configuration for KYC documents
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT}
      DO_SPACES_REGION: ${DO_SPACES_REGION}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET}
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_CDN_ENDPOINT: ${DO_SPACES_CDN_ENDPOINT}
      # Google Cloud Vision for OCR
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - vendfinder-net

  chat-service:
    build: ./chat-service
    ports:
      - '3005:3005'
    environment:
      PORT: '3005'
      DATABASE_URL: postgresql://vendfinder:vendfinder_pass@chat-db:5432/chat_db
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3004
      BOT_USER_ID: '00000000-0000-0000-0000-000000000001'
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-vendfinder-internal-key-change-in-production}
      CORS_ORIGIN: '*'
    depends_on:
      chat-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - vendfinder-net

  product-service:
    build: ./product-service
    ports:
      - '3007:3000'
    environment:
      PORT: '3000'
      DATABASE_URL: postgresql://vendfinder:vendfinder_pass@product-db:5432/product_db
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3004
      CORS_ORIGIN: '*'
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - vendfinder-net

  order-service:
    build: ./order-service
    ports:
      - '3008:3000'
    environment:
      PORT: '3000'
      DATABASE_URL: postgresql://vendfinder:vendfinder_pass@order-db:5432/order_db
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3004
      PRODUCT_SERVICE_URL: http://product-service:3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      CORS_ORIGIN: '*'
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - vendfinder-net

  websocket-service:
    build: ./websocket-service
    ports:
      - '3006:3006'
    environment:
      PORT: '3006'
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3004
      CHAT_SERVICE_URL: http://chat-service:3005
      CORS_ORIGIN: '*'
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - vendfinder-net

  support-bot:
    build: ./support-bot
    ports:
      - '3009:3009'
    environment:
      PORT: '3009'
      BOT_USER_ID: '00000000-0000-0000-0000-000000000001'
      CHAT_SERVICE_URL: http://chat-service:3005
      ORDER_SERVICE_URL: http://order-service:3000
      PRODUCT_SERVICE_URL: http://product-service:3000
      USER_SERVICE_URL: http://user-service:3004
      REDIS_URL: redis://redis:6379
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-vendfinder-internal-key-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6-20250514}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      MAX_HISTORY_MESSAGES: '20'
      RESPONSE_DELAY_MS: '1000'
    depends_on:
      redis:
        condition: service_healthy
      chat-service:
        condition: service_started
    networks:
      - vendfinder-net

  api-gateway:
    build: ./api-gateway-build
    ports:
      - '3000:3000'
    environment:
      PORT: '3000'
      USER_SERVICE_URL: http://user-service:3004
      CHAT_SERVICE_URL: http://chat-service:3005
      WEBSOCKET_SERVICE_URL: http://websocket-service:3006
      PRODUCT_SERVICE_URL: http://product-service:3000
      ORDER_SERVICE_URL: http://order-service:3000
      CORS_ORIGIN: '*'
      DO_SPACES_KEY: ${DO_SPACES_KEY}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-vendfinder-uploads}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-sfo3}
    depends_on:
      - user-service
      - chat-service
      - websocket-service
      - product-service
      - order-service
    networks:
      - vendfinder-net

volumes:
  chat-db-data:
  user-db-data:
  product-db-data:
  order-db-data:
