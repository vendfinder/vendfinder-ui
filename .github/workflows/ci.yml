name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'release/**', 'hotfix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  NODE_VERSION: '22'
  REGISTRY: registry.digitalocean.com/vendfinder-registry
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Code Quality & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx

      - name: Check code formatting with Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

      - name: Validate conventional commits
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            npx commitlint --from="${{ github.event.pull_request.base.sha }}" --to="${{ github.sha }}"
          fi

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Generate test coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Test database migrations
        run: npm run test:migrations
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db

  build:
    name: Build & Docker Images
    runs-on: ubuntu-latest
    needs: [quality, test]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate semantic version
        id: version
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            VERSION="staging-$(git rev-parse --short HEAD)"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/heads\/release\///')
          else
            VERSION="feature-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_PAYPAL_CLIENT_ID=${{ secrets.NEXT_PUBLIC_PAYPAL_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push microservices
        run: |
          # Dynamically discover services with Dockerfiles
          services=()
          for dir in */; do
            if [ -f "${dir}Dockerfile" ] && [[ "${dir%/}" != "." ]] && [[ "${dir%/}" != node_modules* ]]; then
              services+=("${dir%/}")
            fi
          done

          # Fallback to known services if discovery fails
          if [ ${#services[@]} -eq 0 ]; then
            services=("user-service-oauth" "chat-service" "product-service" "order-service" "websocket-service" "support-bot" "api-gateway-build")
          fi

          # Ensure critical services are always included if directories exist
          critical_services=("api-gateway-build" "user-service-oauth")
          for critical in "${critical_services[@]}"; do
            if [ -d "./${critical}" ] && [ -f "./${critical}/Dockerfile" ]; then
              if [[ ! " ${services[@]} " =~ " ${critical} " ]]; then
                services+=("$critical")
                echo "Added missing critical service: $critical"
              fi
            fi
          done

          echo "Discovered services: ${services[*]}"

          # Function to build a service with error handling
          build_service() {
            local service=$1
            local version=$2
            local registry=$3

            # Map directory names to image names for production compatibility
            local image_name="$service"
            case "$service" in
              "api-gateway-build")
                image_name="api-gateway"
                ;;
              "user-service-oauth")
                # This directory contains the main user-service
                image_name="user-service"
                ;;
            esac

            echo "🔨 Building ${service} → ${image_name}..."

            if [ ! -d "./${service}" ]; then
              echo "❌ Directory ./${service} does not exist, skipping"
              return 0
            fi

            if [ ! -f "./${service}/Dockerfile" ]; then
              echo "❌ No Dockerfile found in ./${service}, skipping"
              return 0
            fi

            # Build with better caching and error handling
            if ! docker buildx build \
              --platform linux/amd64 \
              --cache-from type=gha,scope=${service} \
              --cache-to type=gha,mode=max,scope=${service} \
              -t ${registry}/${image_name}:${version} \
              -t ${registry}/${image_name}:latest \
              --push \
              ./${service}; then
              echo "❌ Failed to build ${service} → ${image_name}"
              return 1
            fi

            echo "✅ Successfully built and pushed ${service} → ${image_name}"
            return 0
          }

          # Export function for parallel execution
          export -f build_service
          export REGISTRY="${{ env.REGISTRY }}"
          export VERSION="${{ steps.version.outputs.version }}"

          # Build services in parallel (max 3 concurrent builds to avoid resource exhaustion)
          echo "${services[*]}" | tr ' ' '\n' | xargs -I {} -P 3 bash -c 'build_service "$1" "$VERSION" "$REGISTRY"' _ {}

          # Check if any builds failed
          if [ $? -ne 0 ]; then
            echo "❌ One or more service builds failed"
            exit 1
          fi

          echo "✅ All services built successfully"

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Run Trivy vulnerability scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/frontend:${{ needs.build.outputs.version }}'
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'

      - name: Upload Trivy scan results for Frontend
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'container-frontend'

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy

      - name: Run Trivy vulnerability scanner on critical services
        run: |
          critical_services=("user-service-oauth" "product-service" "order-service" "chat-service")

          for service in "${critical_services[@]}"; do
            echo "🔍 Scanning ${service} for vulnerabilities..."

            # Run Trivy scan
            if trivy image \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --format table \
              ${{ env.REGISTRY }}/${service}:${{ needs.build.outputs.version }}; then
              echo "✅ ${service} passed security scan"
            else
              echo "⚠️  High/Critical vulnerabilities found in ${service} - logging for review"
            fi

            echo "✅ ${service} passed security scan"
          done

  k8s-validate:
    name: Kubernetes Validation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Validate Kubernetes manifests
        run: |
          echo "🔍 Validating Kubernetes manifest generation..."

          # Test kustomize can generate staging manifests
          kubectl kustomize environments/staging > /tmp/staging.yaml
          echo "✅ Staging manifests generated successfully"

          # Test kustomize can generate production manifests
          kubectl kustomize environments/production > /tmp/production.yaml
          echo "✅ Production manifests generated successfully"

          # Validate YAML syntax (lenient mode for generated manifests)
          if command -v yamllint >/dev/null 2>&1; then
            yamllint -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable}}' /tmp/staging.yaml /tmp/production.yaml
            echo "✅ YAML syntax validation passed"
          else
            echo "ℹ️  yamllint not available, skipping YAML syntax validation"
          fi

          echo "✅ Kubernetes manifest validation complete"
